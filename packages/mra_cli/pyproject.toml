[project]
name = "mra-cli"
version = "1.0.0"
description = "CLI interface for market regime analysis"
requires-python = ">=3.13"
dependencies = [
    "mra-lib",
    "click>=8.2.1",
]

[project.scripts]
mra = "mra_cli.main:cli"
mra-optimize = "mra_cli.optimization:main"

[tool.uv.sources]
mra-lib = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mra_cli"]

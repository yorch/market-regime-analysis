# ── Virtual workspace root ─────────────────────────────────────────────────
# This file ties the workspace packages together and centralizes tool config.
# It is NOT a buildable package itself.

[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
mra-lib = { workspace = true }
mra-cli = { workspace = true }
mra-web = { workspace = true }

[tool.uv]
dev-dependencies = [
    "mypy>=1.11.0",
    "pre-commit>=4.2.0",
    "pytest>=8.4.1",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.12.4",
]

# ── Ruff (shared across all packages) ──────────────────────────────────────

[tool.ruff]
line-length = 100
exclude = [".venv", "__pycache__", "build", "dist"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4", "T20", "SIM", "PL", "RUF"]
ignore = ["E501"]
fixable = ["ALL"]

[tool.ruff.lint.per-file-ignores]
"packages/mra_web/src/mra_web/*.py" = ["T201", "PLR2004", "PLR0913"]
"packages/mra_lib/src/mra_lib/analyzer.py" = ["T201", "PLR2004", "B023", "B904", "PLR0912", "PLR0915", "PLC0415", "SIM102", "SIM118", "RUF005"]
"packages/mra_lib/src/mra_lib/portfolio/*.py" = ["T201", "PLR2004"]
"packages/mra_lib/src/mra_lib/risk/*.py" = ["T201", "PLR2004", "PLR0913"]
"packages/mra_lib/src/mra_lib/indicators/hmm_detector.py" = ["PLR2004", "B904", "B023", "PLR0911"]
"packages/mra_lib/src/mra_lib/indicators/true_hmm_detector.py" = ["PLR2004", "PLR0911", "PLR0912"]
"packages/mra_lib/src/mra_lib/backtesting/*.py" = ["T201", "PLR2004", "PLR0913", "SIM102", "SIM103"]
"packages/mra_cli/src/mra_cli/*.py" = ["T201", "PLR2004"]
"**/tests/*.py" = ["T201", "PLC0415", "PLR0912", "PLR0915", "PLR2004"]
"examples/*.py" = ["T201", "PLR2004"]
"*.ipynb" = ["E402", "PLR2004", "RUF001", "T201"]

[tool.ruff.lint.isort]
combine-as-imports = true
known-first-party = ["mra_lib", "mra_cli", "mra_web"]

# ── mypy (shared across all packages) ──────────────────────────────────────

[tool.mypy]
python_version = "3.13"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = [
    "hmmlearn.*",
    "alpha_vantage.*",
    "yfinance.*",
    "polygon.*",
    "sklearn.*",
    "statsmodels.*",
]
ignore_missing_imports = true

# ── pytest (shared across all packages) ────────────────────────────────────

[tool.pytest.ini_options]
testpaths = [
    "packages/mra_lib/tests",
    "packages/mra_cli/tests",
    "packages/mra_web/tests",
]
markers = [
    "integration: tests that call external APIs (deselect with '-m \"not integration\"')",
    "slow: tests that take a long time to run (deselect with '-m \"not slow\"')",
]

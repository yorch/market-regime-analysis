# Override: adds PostgreSQL for persistent storage
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d
# Or set in .env:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.postgres.yml

services:
  scanner:
    environment:
      # Override storage backend to postgres
      STORAGE_BACKEND: postgres
      DATABASE_URL: "postgresql://appuser:${POSTGRES_PASSWORD:-defaultpw}@postgres:5432/appdb"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-defaultpw}"
      POSTGRES_DB: appdb
    volumes:
      - app-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  app-pgdata:

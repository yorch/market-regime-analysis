# Override: adds Postgres for persistent storage
# Usage: docker compose -f docker-compose.yml -f docker-compose.postgres.yml up

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mra_secret}
      POSTGRES_DB: ${POSTGRES_DB:-market_regime}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mra}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mra}:${POSTGRES_PASSWORD:-mra_secret}@db:5432/${POSTGRES_DB:-market_regime}

volumes:
  pgdata:

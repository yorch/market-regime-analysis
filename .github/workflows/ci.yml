name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      push:
        description: "Push Docker images to registries"
        type: boolean
        default: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
  POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
  JWT_SECRET: ci-secret

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: extractions/setup-just@v3

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff check)
        run: just lint

      - name: Format check (ruff format)
        run: just fmt-check

  # ── Type Check ───────────────────────────────────────────────────────────
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: extractions/setup-just@v3

      - name: Install dependencies
        run: uv sync

      - name: Type check (mypy)
        run: just types

  # ── Test ─────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - uses: extractions/setup-just@v3

      - name: Install dependencies
        run: uv sync

      - name: Test mra_lib
        run: >
          uv run pytest
          -m "not integration and not slow"
          packages/mra_lib/tests/
          -v --tb=short

      - name: Test mra_cli
        run: >
          uv run pytest
          -m "not integration and not slow"
          packages/mra_cli/tests/
          -v --tb=short

      - name: Test mra_web
        run: >
          uv run pytest
          -m "not integration and not slow"
          packages/mra_web/tests/
          -v --tb=short

  # ── Build ────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync

      - name: Build mra-lib
        run: uv build --package mra-lib

      - name: Build mra-cli
        run: uv build --package mra-cli

      - name: Build mra-web
        run: uv build --package mra-web

  # ── Integration Test (manual only) ──────────────────────────────────────
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: extractions/setup-just@v3

      - name: Install dependencies
        run: uv sync

      - name: Integration tests — mra_lib
        run: >
          uv run pytest
          -m "integration"
          packages/mra_lib/tests/
          -v --tb=short

      - name: Integration tests — mra_cli
        run: >
          uv run pytest
          -m "integration"
          packages/mra_cli/tests/
          -v --tb=short

      - name: Integration tests — mra_web
        run: >
          uv run pytest
          -m "integration"
          packages/mra_web/tests/
          -v --tb=short

  # ── Docker ───────────────────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to external registry
        if: vars.EXTERNAL_REGISTRY_URL != ''
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.EXTERNAL_REGISTRY_URL }}
          username: ${{ secrets.EXTERNAL_REGISTRY_USERNAME }}
          password: ${{ secrets.EXTERNAL_REGISTRY_PASSWORD }}

      - name: Extract commit metadata
        id: meta-info
        run: |
          echo "datetime=$(git log -1 --format='%cd' --date=format:'%Y%m%d%H%M%S')" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build image list
        id: images
        run: |
          IMAGES="ghcr.io/${{ github.repository }}"
          if [ -n "${{ vars.EXTERNAL_REGISTRY_URL }}" ]; then
            EXTERNAL_IMAGE="${{ vars.EXTERNAL_REGISTRY_URL }}/${{ vars.EXTERNAL_REGISTRY_IMAGE || github.event.repository.name }}"
            IMAGES="${IMAGES},${EXTERNAL_IMAGE}"
          fi
          echo "list=${IMAGES}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.images.outputs.list }}
          tags: |
            type=ref,event=pr
            type=raw,value=${{ steps.meta-info.outputs.datetime }}_${{ steps.meta-info.outputs.sha }},enable=${{ github.event_name != 'pull_request' }}
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'publish-docker')) || (github.event_name == 'workflow_dispatch' && inputs.push) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
